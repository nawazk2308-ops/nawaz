<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>gradient</title>
    <link rel="stylesheet" href="09_gradient.css" />
  </head>
  <body>
    <h1>Gradient</h1>
    <div class="container">
      <!-- linear -->
      <div class="linear">
        <h2>this is linear gradient</h2>
      </div>

      <!-- radial  -->

      <div class="radial">
        <h2>this is radial gradient</h2>
      </div>

      <!-- conic -->

      <div class="conic">
        <h2>this is conic gradient</h2>
      </div>

     

      <div class="rainbow">
        <h2>this is rainbow</h2>
      </div>

      <!-- linear rainbow -->
    </div>
  </body>
</html>
