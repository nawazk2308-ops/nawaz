<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>types of css</title>

    <!-- external -->
    <link rel="stylesheet" href="./01_types_of_css.css">

    <style>
      .heading3 {
        color: brown;
      }
    </style>
  </head>

    <!-- 01.inline css -->

    <h1 style="color: blueviolet">this is some heading</h1>

    <!-- 02. -->

    <!-- internal -->

    <h3>this is heading 3</h3>

    <!-- 03 external -->
    
    <h2 id="external" >this is external css text</h2>

  </body>
