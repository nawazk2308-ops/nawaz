<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>tag, elements and attributes</title>
  </head>
  <body>
    <!-- tag -->

    <p></p>

    <h1></h1>

    <!-- elements -->

    <h1>this is heading 1</h1>

    <!-- attributes -->

    <ol type="1" start="24">
      <li>list-1</li>
      <li>list-2</li>
      <li>list-3</li>
    </ol>

    
  </body>
</html>
