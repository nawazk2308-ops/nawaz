<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form action="">

        <h1><b>SIGN-UP</b></h1>
        <br>

    <label for="name">NAME</label>
        <input type="text" placeholder="enter your name" name="name" id="name" required/>

           <br>
           <br>
         
    <label for="email">EMAIL</label>
        <input type="text" placeholder="enter your email" name="email" id="email"required />   

           <br>
           <br>

    <label for="address">ADDRESS</label>
        <input type="textarea" name="address" id="address" placeholder="enter your address"required>       
           
           <br>
           

    <label for="password"><h5>PASSWORD</h5></label>
         <input type="password" placeholder="enter your password" required />

    <br>
    <br>

     <label for="gender"><h5>GENDER</h5></label>
      <input type="radio" id="gender" value="male" name="gender"required /> male
      <input type="radio" id="gender" value="female" name="gender"required />female

      <br>
      <br>

    <label for="">STATES</label>

      <select name="" id="" name="state">
        <option value="bhavnagar" selected>bhavnagar</option>
        <option value="ahmedabad">ahmedabad</option>
        <option value="surat">surat</option>
         <option value="vododra">vododra</option>
      </select>    
         
         <br>
         <br>


    <input type="reset" id="reset" name="result" />
    <br>
    <input type="submit" id="submit" name="submit" />   
      


    </form>

     
    
</body>
</html>
